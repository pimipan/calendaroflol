name: Update calendar

on:
  schedule:
    # 16:00-22:00 Asia/Shanghai and Asia/Taipei, expressed in UTC.
    - cron: "0 8-14 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Test
        run: npm test

      - name: Build calendar
        run: npm run build
        env:
          LOLESPORTS_API_KEY: ${{ secrets.LOLESPORTS_API_KEY }}
          PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
